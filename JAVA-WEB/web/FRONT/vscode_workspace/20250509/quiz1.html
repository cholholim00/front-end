<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="./quiz1.css">
  </head>
  <body>
    <div class="container2">
        <div class="row mb-5">
            <div class="col">
                <h2>회원가입</h2>
                <span>회원정보는 반드시 입력해야 합니다</span>
            </div>
        </div>
        <hr class="myHr">
        <div class="row">
            <div class="col-3 align-self-center">회원구분<span class="star">*</span></div>
            <div class="col">
                <select class="form-select" aria-label="회원유형정보">
                    <option selected value="1">학생</option>
                    <option value="2">학부모</option>
                    <option value="3">일반인</option>
                  </select>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-3 align-self-center">아이디</div>
            <div class="col">
                <input class="form-control" type="text" placeholder="">
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-3 align-self-center">비밀번호</div>
            <div class="col">
                <input type="password" class="form-control" >
                <span class="explain">비밀번호는 영문, 숫자 포함 6자 이상으로만 가입됩니다.</span>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-3 align-self-center">비밀번호 확인</div>
            <div class="col">
                <div class="col">
                    <input type="password" class="form-control" >
                </div>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-3 align-self-center">이름</div>
            <div class="col">
                <p>	아이핀 본인확인 후에는 이름이 자동 입력되고 휴대폰 본인확인 후에는 이름과 휴대폰번호가 자동 입력되어 수동으로 입력할수 없게 됩니다.</p>
                <div class="row gx-0">
                    <div class="col-5">
                        <input class="form-control" type="text" placeholder="">
                    </div>
                    <div class="col">
                        <button class="form-control bg-dark text-white">아이핀 본인확인</button>
                    </div>
                    <div class="col p-0">
                        <button class="form-control bg-dark text-white">휴대폰 본인확인</button>
                    </div>
                </div>    
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-3 align-self-center">이메일</div>
            <div class="col">
                <input type="email" class="form-control" placeholder="">
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-3 align-self-center">기타입력사항</div>
            <div class="col">
                <textarea class="form-control" rows="5" placeholder="기타 입력사항을 입력해주세요(학부모일 경우 자녀의 학년, 반, 번호를 입력하세요.)"></textarea>
            </div>
        </div>
        <div class="row">
            <div class="col d-grid">
                <button class="btn myBtn" type="button">작성완료</button>
            </div>
        </div>
        <div class="row">
            <div class="colcol d-grid">
                <button class="btn myBtn" type="button">취소</button>
            </div>
        </div>
    </div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <!-- <script src="./quiz1.js"></script> -->
  </body>
</html>
